version: v2
managed:
  enabled: true

plugins:
  - local: protoc-gen-go
    out: ../api/go-sdk
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: ../api/go-sdk
    opt: paths=source_relative
  - local: protoc-gen-sqlc
    out: ../product/backend-connect-go
    opt: paths=source_relative

inputs:
  - directory: protos
  - directory: third_party
